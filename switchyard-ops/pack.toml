# switchyard-ops — the 24-hour heartbeat for any Gas City driven by switchyard.
#
# Encodes the continuous-improvement loop as mechanical exec orders:
#   pool-spawn     — spawn a brakeman for a rig with claimable demand + assign it (1m)
#   merge-gate     — worker beads carry a merge_strategy before merge (5m)
#   loop-health    — pinned coordinators alive + status probe honest (30m)
#   intake-sweep   — nudge coordinators to triage switchyard intake (4h)
#   nightly-retro  — nudge the retro agent to draft daily reports (24h)
#   stray-reaper   — detect sessions from foreign/stale city paths (6h)
#   config-drift   — config-as-code guard (6h; no-ops if the city isn't a repo)
#   events-rotate  — cap .gc/events.jsonl to a recent tail (24h; gc has no retention)
#   scratch-reaper — report/prune orphaned gc-scratch dirs at the city root (6h)
#   disk-watch     — mail the mayor when a path crosses a size threshold (12h)
#
# Governing invariant: every silent failure becomes mail to the mayor within
# one order cycle.
#
# ...and ships one agent:
#   brakeman       — the worker pool. This is what you sling beads to. Sessions
#                    are named after railway occupations (see its namepool.txt).
#
# IMPORT AT CITY SCOPE ONLY — `[imports.switchyard-ops]` in pack.toml.
# One city import yields BOTH the orders and a brakeman pool in every rig: gc
# expands a pack's rig-scoped agents into each rig from the city import. Adding
# `[rigs.imports.switchyard-ops]` on top registers every order a SECOND time
# under that rig — duplicate nudges, duplicate mail. To keep workers out of a
# rig, suspend the agent there ([[patches.agent]] suspended = true) rather than
# withholding the import.
#
# CITY-AGNOSTIC: this pack names no rig, and the only agent it names is its own.
# The liveness roster is derived from `gc agent list --json` (pool.min >= 1, not
# suspended). Anything gc cannot express — singleton aliases, which agent runs
# the retro — lives in a city-local, un-versioned $GC_PACK_STATE_DIR/roster.conf.
# See assets/roster.conf.example.
#
# Requires: jq, tmux, gastown (brakeman runs its mol-polecat-work formula and
# hands off to its refinery), and — for the sweeps to be useful — the
# switchyard-mcp overlay in any rig whose coordinator should drive switchyard.
#
# Import city-wide:
#   [imports.switchyard-ops]
#   source = "https://github.com/outdoorsea/switchyard-packs/tree/main/switchyard-ops"
#   # ...or from a local checkout of this repo:
#   #   source = "/path/to/switchyard/packs/switchyard-ops"

[pack]
name = "switchyard-ops"
schema = 2
