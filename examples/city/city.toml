# Example city.toml. Copy to your city root and edit.
#
# city.toml is DELIBERATELY machine-specific: it is the rig roster this box
# runs, plus pool tuning and operational holds. Keep it OUT of any shared repo —
# the portable pins live in pack.toml. Two machines running the same packs will
# have different city.toml files, and that is correct.
#
# NOTE: `gc rig add` / `gc rig resume` REWRITE this file and drop comments.
# After any gc command that rewrites config, re-check your [[patches.agent]]
# blocks. The config-drift order mails the mayor when the tracked surface
# diverges from git HEAD.

[workspace]
provider = "claude"

[providers]
  [providers.claude]
    base = "builtin:claude"

# --- One rig per product. Each imports gastown (refinery + witness), the -----
# --- switchyard-mcp overlay (so its coordinator can drive switchyard), and ---
# --- switchyard-ops again at rig scope (so it gets brakeman workers). --------
[[rigs]]
name = "example-rig"
prefix = "ex"
default_branch = "main"

# A bare `gc sling <bead>` with no target picks one of these at random. Name the
# worker pool here and dispatch never has to know an agent's name.
# (These keys must precede [rigs.imports] — a bare key after a subtable header
# would be parsed as belonging to that subtable.)
default_sling_targets = ["example-rig/switchyard-ops.brakeman"]

# REQUIRED when brakeman is in play. {{binding_prefix}} in gastown's
# mol-polecat-work is the binding of the pack that COOKED the formula — which is
# switchyard-ops, not gastown. Left alone, the submit step hands work off to
# "example-rig/switchyard-ops.refinery", an agent nobody ships, and the bead is
# stranded open with its branch pushed and no reviewer. Pinning it renders
# "gastown.refinery". gastown's own polecat resolves to the same value, so this
# is a no-op for it.
formula_vars = { binding_prefix = "gastown." }

  [rigs.imports]
    [rigs.imports.gastown]
      source = "https://github.com/gastownhall/gascity-packs/tree/main/gastown"
      version = "sha:<pin-a-gastown-commit>"
    [rigs.imports.switchyard-mcp]
      source = "https://github.com/outdoorsea/switchyard-packs/tree/main/switchyard-mcp"
      version = "sha:<pin-a-mirror-commit>"
    # switchyard-ops is imported city-wide too (pack.toml) for its orders. THIS
    # rig-scoped import is what materializes the brakeman worker pool.
    # Sling explicitly with:
    #   gc sling example-rig/switchyard-ops.brakeman ex-1234
    [rigs.imports.switchyard-ops]
      source = "https://github.com/outdoorsea/switchyard-packs/tree/main/switchyard-ops"
      version = "sha:<pin-a-mirror-commit>"

# --- Coordinators: pinned. Workers: elastic. -------------------------------
# A coordinator is a long-lived crew agent that owns one rig's switchyard
# project. Pin it with min_active_sessions = 1 and switchyard-ops will discover
# it automatically — no roster to maintain.
#
# EXCEPTION — singleton aliases: if a coordinator's alias is held by a manual
# session you start yourself, do NOT pin it. min=1 does not keep your session
# alive (the reconciler only counts sessions it spawned); it mints a SECOND
# session that fights the alias. Leave it min=0 and list it in
# roster.conf's PINNED_EXTRA so loop-health wakes the alias instead.
#
# [[patches.agent]]
#   dir = "example-rig"
#   name = "coordinator"
#   min_active_sessions = 1
#   max_active_sessions = 1
